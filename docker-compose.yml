version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: medicheck-app
    container_name: medicheck_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - medicheck_network

  web:
    image: nginx:alpine
    container_name: medicheck_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - medicheck_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: medicheck_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: medicheck_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - medicheck_network

networks:
  medicheck_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
