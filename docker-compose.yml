version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: medicheck-app
    container_name: medicheck_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - medicheck_network

  web:
    image: nginx:alpine
    container_name: medicheck_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - medicheck_network
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    container_name: medicheck_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    command: postgres -c shared_buffers=64MB -c max_connections=50 -c work_mem=4MB
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - medicheck_network

networks:
  medicheck_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
